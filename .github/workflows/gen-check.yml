name: "Check generated files"
on:
  push:
    branches: [develop, major]
  pull_request:
    branches: [develop, major]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies 📦
        run: npm ci

      - name: Generate files
        run: npm run gen

      - name: Check for changes 🧐
        run: |
          changes=$(git status --porcelain)
          # Check for changes in regenerated files
          if ! test -z "$changes"
          then
            echo "Generated files are not up to date. Perhaps you forgot to update generated files?"
            echo "$changes"
            exit 1
          fi
