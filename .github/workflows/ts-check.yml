name: Type Check
on:
  push:
    branches: [develop, major]
  pull_request:
    branches: [develop, major]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies 📦
        run: npm ci

      - name: Run typescript check 🧐
        run: npm run test:ts
